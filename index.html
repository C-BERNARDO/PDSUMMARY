<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PD Summary Consolidator</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='4' width='10' height='10' rx='1.5' fill='%232563eb'/%3E%3Crect x='18' y='4' width='10' height='10' rx='1.5' fill='%232563eb'/%3E%3Crect x='4' y='18' width='10' height='10' rx='1.5' fill='%232563eb'/%3E%3Crect x='18' y='18' width='10' height='10' rx='1.5' fill='%232563eb'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="main.css" />
</head>
<body>

<div class="app-shell">

  <!-- == SIDEBAR == -->
  <aside class="sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">PDC Summary</span>
        <span class="brand-sub">Report Consolidator</span>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Upload zone -->
    <div class="sidebar-section">
      <p class="section-label">Data Source</p>
      <div class="drop-zone" id="dropArea">
        <input type="file" id="fileInput" multiple accept=".xls,.xlsx" />
        <div class="drop-zone-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M16 12l-4-4m0 0l-4 4m4-4v12"/>
          </svg>
        </div>
        <p class="drop-zone-text">Drop Excel files here</p>
        <p class="drop-zone-hint">or click to browse &middot; .xls / .xlsx</p>
      </div>
    </div>

    <!-- File list -->
    <div id="fileListWrapper" class="file-queue" style="display:none;">
      <div class="file-queue-header">
        <span class="file-queue-label">Queue</span>
        <span id="fileCount" class="file-queue-badge">0</span>
      </div>
      <div id="fileListItems" class="file-queue-items"></div>
    </div>

    <!-- Spacer pushes actions to bottom -->
    <div class="sidebar-spacer"></div>

    <!-- Status -->
    <div id="status" class="status-alert hidden"></div>

    <!-- Actions -->
    <div class="sidebar-actions">
      <button id="processBtn" class="btn btn-primary" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Process Files
      </button>
      <button id="clearBtn" class="btn btn-ghost">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Clear All
      </button>
    </div>

  </aside>

  <!-- == MAIN PANEL == -->
  <main class="main-panel">

    <!-- Scrollable results area -->
    <div class="results-scroll">
      <div id="results" class="results-area">

        <!-- Empty state -->
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 80 80" fill="none">
              <circle cx="40" cy="40" r="38" stroke="#e2e8f0" stroke-width="2"/>
              <rect x="24" y="28" width="32" height="4" rx="2" fill="#cbd5e0"/>
              <rect x="24" y="38" width="24" height="4" rx="2" fill="#e2e8f0"/>
              <rect x="24" y="48" width="28" height="4" rx="2" fill="#e2e8f0"/>
            </svg>
          </div>
          <h3 class="empty-title">No report generated yet</h3>
          <p class="empty-desc">Upload one or more Excel campaign summary files from the left panel, then click <strong>Process Files</strong> to generate the consolidated performance report.</p>
        </div>

      </div>
    </div>

  </main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="main.js"></script>
</body>
</html>
